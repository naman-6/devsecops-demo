
services:
  redis:
    image: redis:5.0.3-alpine
    container_name: local_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: local_api
    ports:
      - "8000:8000"
    environment:
      # This dynamically tells the Python app where to find the database
      - REDIS_HOST=redis
    depends_on:
      - redis
